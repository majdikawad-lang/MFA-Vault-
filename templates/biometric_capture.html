{% extends 'base.html' %}
{% block title %}Biometric Verification{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>{{ title }}</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;" id="statusText">Please allow camera access.</p>

    <div style="position: relative; width: 100%; max-width: 400px; margin: 0 auto 2rem; border-radius: 1rem; overflow: hidden; border: 2px solid var(--border);">
        <video id="videoElement" autoplay playsinline style="width: 100%; height: auto; transform: scaleX(-1);"></video>
        <canvas id="canvasElement" style="display: none;"></canvas>
    </div>

    <form id="bioForm" method="POST" action="{{ action_url }}">
        <input type="hidden" name="image_data" id="imageData">
        <input type="hidden" name="method" value="{{ method_type }}">
        <button type="button" class="btn-primary" id="captureBtn" onclick="captureAndSubmit()">Capture & Process</button>
    </form>
    
    <a href="{{ url_for('main.profile') }}" class="btn-secondary" style="display:inline-block; margin-top: 1rem;">Cancel</a>
</div>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const imageDataInput = document.getElementById('imageData');
    const form = document.getElementById('bioForm');
    const captureBtn = document.getElementById('captureBtn');

    // Request camera access
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera access denied:", err);
            document.getElementById('statusText').innerText = "Camera access is required for biometrics.";
            document.getElementById('statusText').style.color = "var(--danger)";
            captureBtn.disabled = true;
        });

    function captureAndSubmit() {
        captureBtn.innerText = "Processing...";
        captureBtn.disabled = true;
        
        // Draw video frame to canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        // Flip horizontally to match the mirrored video
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Convert to base64
        const dataURL = canvas.toDataURL('image/jpeg', 0.8);
        imageDataInput.value = dataURL;
        
        // Submit form
        form.submit();
    }
</script>
{% endblock %}
