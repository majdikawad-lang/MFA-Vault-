{% extends 'base.html' %}

{% block title %}Change Password - MFA System{% endblock %}

{% block content %}
<div class="auth-header">
    <h2>Change Password</h2>
    <p>Update your account security</p>
</div>

<form method="POST" action="{{ url_for('main.change_password') }}">
    <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="old_password" class="form-control" required>
    </div>
    <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" class="form-control" required minlength="8" title="At least 8 characters, one uppercase, one lowercase, one number, and one special character">
    </div>
    <button type="submit" class="btn btn-primary">Update Password</button>
</form>

<p class="links">
    <a href="{{ url_for('main.profile') }}">Back to Profile</a>
</p>
{% endblock %}
