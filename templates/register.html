{% extends 'base.html' %}

{% block title %}Register - MFA System{% endblock %}

{% block content %}
<h2>Create Account</h2>
<form method="POST" action="{{ url_for('auth.register') }}">
    <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" class="form-control" required placeholder="John Doe">
    </div>
    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" required placeholder="name@example.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Strong Password">
        <small style="color:var(--text-secondary);font-size:0.8rem;display:block;margin-top:5px;">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.</small>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
</form>
<p class="links">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
{% endblock %}
