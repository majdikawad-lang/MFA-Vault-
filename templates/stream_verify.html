{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>{{ title }}</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Authenticating against your biometric signature...</p>

    <div style="position: relative; width: 100%; max-width: 400px; margin: 0 auto 2rem; border-radius: 1rem; overflow: hidden; border: 2px solid var(--border); background: #000;">
        <img src="{{ feed_url }}" style="width: 100%; height: auto; display: block;" id="videoFeed" alt="Video Feed Loading..."/>
    </div>

    <div id="loadingIndicator" style="margin-bottom: 1rem; display: none; color: var(--accent);">
        Processing verification, please wait...
    </div>

    <a href="{{ url_for('biometric.biometric_verify') }}" class="btn-secondary" style="display:inline-block; margin-top: 1rem;" id="cancelBtn">Cancel</a>
</div>

<script>
    const statusUrl = "{{ status_url }}";
    const commitUrl = "{{ commit_url }}";
    
    let checkInterval = setInterval(() => {
        fetch(statusUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'done') {
                    clearInterval(checkInterval);
                    document.getElementById('loadingIndicator').style.display = 'block';
                    document.getElementById('cancelBtn').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = commitUrl;
                    }, 1000);
                } else if (data.status === 'timeout') {
                    clearInterval(checkInterval);
                    alert("Verification timed out. Please try again.");
                    window.location.href = "{{ url_for('biometric.biometric_verify') }}";
                } else if (data.status === 'error') {
                    clearInterval(checkInterval);
                    alert("An error occurred initializing the model.");
                    window.location.href = "{{ url_for('biometric.biometric_verify') }}";
                }
            })
            .catch(err => console.error(err));
    }, 1000);
</script>
{% endblock %}
